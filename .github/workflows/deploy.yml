name: Deploy Backend to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Backend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Repository Owner Downcase
        id: repo_owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./app_build/backend
          file: ./app_build/backend/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.repo_owner.outputs.owner }}/promptiq-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hostinger VPS via SSH
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # 1. Navigate to deployment folder on Hostinger
            cd /opt/promptiq || { echo "Directory /opt/promptiq not found. Creating it..."; mkdir -p /opt/promptiq && cd /opt/promptiq; }
            
            # 2. Write/Update docker-compose file on VPS
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            
            services:
              db:
                image: postgres:15-alpine
                container_name: promptiq-db
                ports:
                  - "5432:5432"
                environment:
                  - POSTGRES_USER=promptiq
                  - POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
                  - POSTGRES_DB=promptiq
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                restart: unless-stopped

              backend:
                image: ghcr.io/${{ secrets.GHCR_OWNER_LOWER }}/promptiq-backend:latest
                container_name: promptiq-backend
                ports:
                  - "8000:8000"
                environment:
                  - DATABASE_URL=postgresql://promptiq:${{ secrets.POSTGRES_PASSWORD }}@db:5432/promptiq
                  - LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
                  - LLM_API_KEY=${{ secrets.LLM_API_KEY }}
                  - COGNEE_LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
                  - COGNEE_LLM_API_KEY=${{ secrets.LLM_API_KEY }}
                  - GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
                  - GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
                  - GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
                  - SECRET_KEY=${{ secrets.JWT_SECRET }}
                volumes:
                  - cognee_data:/app/cognee_data
                depends_on:
                  - db
                restart: unless-stopped

            volumes:
              cognee_data:
                driver: local
              postgres_data:
                driver: local
            EOF
            
            # 3. Log in to GitHub Container Registry on VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 4. Pull latest image and restart stack
            docker compose pull backend
            docker compose up -d
            
            # 5. Verify status
            docker compose ps
