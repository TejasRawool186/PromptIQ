version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: promptiq-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=promptiq
      - POSTGRES_PASSWORD=promptiq_secure_pass
      - POSTGRES_DB=promptiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promptiq-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://promptiq:promptiq_secure_pass@db:5432/promptiq
    env_file:
      - .env
    volumes:
      - cognee_data:/app/cognee_data
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped


volumes:
  cognee_data:
    driver: local
  postgres_data:
    driver: local
